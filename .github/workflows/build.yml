# ============================================================
#  RAINAX – GitHub Actions CI/CD
#  Builds on Windows (MSVC), Linux (GCC), macOS (Clang)
#  Produces deployable artifacts on every push/tag/PR
# ============================================================

name: Build RAINAX

on:
  push:
    branches: [ "main", "master", "dev" ]
    tags:     [ "v*.*.*" ]           # triggers Release upload
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:                  # manual trigger from Actions tab

# ── Shared version / Qt version ──────────────────────────────
env:
  QT_VERSION:   "6.8.3"
  BUILD_TYPE:   "Release"
  APP_NAME:     "RAINAX"

# ============================================================
jobs:

# ────────────────────────────────────────────────────────────
#  WINDOWS  (MSVC 2022, x64)
# ────────────────────────────────────────────────────────────
  build-windows:
    name: Windows · MSVC 2022 · Qt ${{ env.QT_VERSION }}
    runs-on: windows-2022

    steps:
      # 1 · Source
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2 · Qt6  (installs Qt + windeployqt + sets PATH/Qt6_DIR)
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version:      ${{ env.QT_VERSION }}
          host:         windows
          target:       desktop
          arch:         win64_msvc2022_64
          cache:        true
          cache-key-prefix: qt-windows-msvc2022

      # 3 · CMake + Ninja (pre-installed on windows-2022)
      - name: Configure
        shell: cmd
        run: |
          cmake -S . -B build ^
            -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ^
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      # 4 · Build
      - name: Build
        shell: cmd
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # 5 · Package with windeployqt
      - name: Deploy (windeployqt)
        shell: cmd
        run: |
          mkdir dist
          copy build\${{ env.APP_NAME }}.exe dist\
          windeployqt ^
            --release ^
            --no-quick-import ^
            --no-translations ^
            --no-opengl-sw ^
            --no-system-d3d-compiler ^
            --skip-plugin-types qmltooling ^
            dist\${{ env.APP_NAME }}.exe

      # 6 · Zip the deployment folder
      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* `
            -DestinationPath "${{ env.APP_NAME }}-windows-x64.zip"

      # 7 · Upload artifact (available in the Actions run for 30 days)
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: ${{ env.APP_NAME }}-windows-x64.zip
          retention-days: 30

      # 8 · On a version tag → attach to GitHub Release
      - name: Upload to Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_NAME }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ────────────────────────────────────────────────────────────
#  LINUX  (Ubuntu 22.04, GCC 12, x86_64)
# ────────────────────────────────────────────────────────────
  build-linux:
    name: Linux · GCC 12 · Qt ${{ env.QT_VERSION }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Qt6 on Linux needs a few OpenGL + X11 headers first
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            g++-12 \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-util-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype-dev \
            fuse \
            libfuse2

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version:      ${{ env.QT_VERSION }}
          host:         linux
          target:       desktop
          arch:         gcc_64
          install-deps: true
          cache:        true
          cache-key-prefix: qt-linux-gcc64

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}"

      - name: Build
        run: cmake --build build --parallel $(nproc)

      # Package as AppImage using linuxdeployqt
      - name: Download linuxdeployqt
        run: |
          wget -q -O linuxdeployqt \
            https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp build/${{ env.APP_NAME }} AppDir/usr/bin/

          # Minimal .desktop file
          cat > AppDir/usr/share/applications/${{ env.APP_NAME }}.desktop <<EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Network;FileTransfer;
          EOF

          # Placeholder icon (replace with your real icon)
          cp resources/icons/logo.png \
            AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png \
            2>/dev/null || \
          convert -size 256x256 xc:#7c6ef5 -fill white -gravity Center \
            -pointsize 80 -annotate 0 "R" \
            AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png || true

      - name: Build AppImage
        run: |
          export LD_LIBRARY_PATH="${Qt6_DIR}/lib:${LD_LIBRARY_PATH}"
          ./linuxdeployqt \
            AppDir/usr/share/applications/${{ env.APP_NAME }}.desktop \
            -qmake="${Qt6_DIR}/../../../bin/qmake" \
            -appimage \
            -no-translations \
            -no-copy-copyright-files \
            2>&1 || true
          # linuxdeployqt writes the AppImage to the current directory
          ls *.AppImage || (
            echo "AppImage not produced — falling back to tar.gz"
            tar -czf ${{ env.APP_NAME }}-linux-x86_64.tar.gz \
              -C build ${{ env.APP_NAME }}
          )
          # Rename whatever was produced
          mv *.AppImage ${{ env.APP_NAME }}-linux-x86_64.AppImage 2>/dev/null || true
          ls -lh ${{ env.APP_NAME }}-* 2>/dev/null || true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x86_64
          path: |
            ${{ env.APP_NAME }}-linux-x86_64.AppImage
            ${{ env.APP_NAME }}-linux-x86_64.tar.gz
          if-no-files-found: warn
          retention-days: 30

      - name: Upload to Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APP_NAME }}-linux-x86_64.AppImage
            ${{ env.APP_NAME }}-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ────────────────────────────────────────────────────────────
#  macOS  (macOS 14 arm64, Clang, Qt universal)
# ────────────────────────────────────────────────────────────
  build-macos:
    name: macOS · Clang · Qt ${{ env.QT_VERSION }}
    runs-on: macos-14         # Apple Silicon (arm64); change to macos-13 for Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version:      ${{ env.QT_VERSION }}
          host:         mac
          target:       desktop
          arch:         clang_64        # universal / arm64 on macos-14
          cache:        true
          cache-key-prefix: qt-macos-clang64

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}"

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      # macdeployqt bundles Qt frameworks + code-signs
      - name: Deploy (macdeployqt)
        run: |
          macdeployqt build/${{ env.APP_NAME }}.app \
            -dmg \
            -no-strip
          mv build/${{ env.APP_NAME }}.dmg \
             ${{ env.APP_NAME }}-macos-arm64.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: ${{ env.APP_NAME }}-macos-arm64.dmg
          retention-days: 30

      - name: Upload to Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_NAME }}-macos-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ────────────────────────────────────────────────────────────
#  Create GitHub Release (tag only, waits for all builds)
# ────────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ build-windows, build-linux, build-macos ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          name: "RAINAX ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → pre-release
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
